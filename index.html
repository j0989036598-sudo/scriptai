<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScriptAI Pro — 短影音腳本智能體</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0D14;--bg2:#111520;--bg3:#161B2A;--bg4:#1D2438;--bg5:#242B3D;
  --border:#ffffff12;--border2:#ffffff20;--border3:#ffffff30;
  --text:#F0F2F8;--text2:#9AA3B8;--text3:#5C6480;
  --coral:#FF6B4A;--coral2:#FF8A6E;--coral-bg:#FF6B4A18;
  --teal:#00D4AA;--teal-bg:#00D4AA14;
  --amber:#FFB84D;--amber-bg:#FFB84D14;
  --purple:#9B7FFF;--purple-bg:#9B7FFF14;
  --red:#FF4D6A;--red-bg:#FF4D6A14;
  --r:10px;--r2:14px;--r3:18px;
}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:4px}
/* LAYOUT */
.layout{display:flex;height:100vh;overflow:hidden}
/* NAV */
.nav{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.nav-logo{padding:20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.nav-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--coral),var(--amber));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.nav-logo-text{font-size:15px;font-weight:700}
.nav-logo-badge{font-size:9px;font-weight:700;background:var(--coral);color:#fff;padding:2px 6px;border-radius:4px;margin-left:2px}
.nav-links{flex:1;padding:12px 0;overflow-y:auto}
.nav-link{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;border-radius:0}
.nav-link:hover{color:var(--text);background:var(--bg3)}
.nav-link.active{color:var(--coral);background:var(--coral-bg);font-weight:600}
.nav-link .nicon{font-size:16px;width:20px;text-align:center}
.nav-section{padding:6px 18px 4px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:8px}
.nav-bottom{padding:12px;border-top:1px solid var(--border)}
.nav-user{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border-radius:var(--r);cursor:pointer}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--coral),var(--amber));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.nav-user-info{flex:1;min-width:0}
.nav-user-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-user-plan{font-size:10px;color:var(--text3)}
/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.page{padding:28px 32px;flex:1}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:28px}
.page-title{font-size:22px;font-weight:700}
.page-sub{font-size:13px;color:var(--text3);margin-top:4px}
/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:20px}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
/* STAT CARD */
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px}
.stat-val{font-size:26px;font-weight:700;line-height:1;margin-bottom:6px}
.stat-lbl{font-size:12px;color:var(--text3)}
.stat-trend{font-size:11px;margin-top:4px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid transparent;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--coral),var(--amber));color:#fff;border:none}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-secondary{background:var(--bg3);border-color:var(--border2);color:var(--text2)}
.btn-secondary:hover{border-color:var(--border3);color:var(--text)}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--text2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
/* FORMS */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.lbl{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.3px}
.inp,.sel,.ta{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:13px;padding:9px 12px;width:100%;transition:border-color .15s}
.inp:focus,.sel:focus,.ta:focus{outline:none;border-color:var(--coral)}
.inp::placeholder{color:var(--text3)}
.ta{resize:vertical;min-height:72px;line-height:1.6}
.sel option{background:var(--bg3)}
/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:5px 11px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.on{background:var(--coral-bg);border-color:var(--coral);color:var(--coral);font-weight:600}
.chip.teal.on{background:var(--teal-bg);border-color:var(--teal);color:var(--teal)}
/* BADGES */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.badge-free{background:var(--bg4);color:var(--text3)}
.badge-pro{background:var(--coral-bg);color:var(--coral);border:1px solid var(--coral)40}
.badge-team{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal)40}
/* NOTIFICATION */
.notif{position:fixed;top:20px;right:20px;z-index:9999;padding:12px 18px;border-radius:var(--r2);font-size:13px;font-weight:600;animation:slideIn .3s ease;max-width:320px}
.notif-ok{background:#00D4AA;color:#003D30}
.notif-err{background:#FF4D6A;color:#fff}
.notif-info{background:#9B7FFF;color:#fff}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.auth-box{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:36px;position:relative;overflow:hidden}
.auth-box::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(var(--coral-bg),transparent 70%);border-radius:50%}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.auth-tabs{display:flex;background:var(--bg3);border-radius:9px;padding:3px;margin-bottom:24px}
.auth-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--text3);font-family:inherit;font-size:13px;cursor:pointer;border-radius:7px;transition:all .15s;font-weight:500}
.auth-tab.active{background:var(--bg);color:var(--text);box-shadow:0 1px 4px #0006}
.auth-divider{text-align:center;font-size:12px;color:var(--text3);margin:16px 0;position:relative}
.auth-divider::before{content:'';position:absolute;left:0;top:50%;width:40%;height:1px;background:var(--border)}
.auth-divider::after{content:'';position:absolute;right:0;top:50%;width:40%;height:1px;background:var(--border)}
/* PLAN CARDS */
.plan-card{border:1px solid var(--border);border-radius:var(--r2);padding:18px;cursor:pointer;transition:all .2s;position:relative}
.plan-card:hover{border-color:var(--border2)}
.plan-card.selected{border-color:var(--coral);background:var(--coral-bg)}
.plan-popular{position:absolute;top:-10px;right:16px;background:var(--coral);color:#fff;font-size:9px;font-weight:700;padding:2px 10px;border-radius:6px;letter-spacing:1px}
.plan-price{font-size:22px;font-weight:700;margin:8px 0 4px}
.plan-price span{font-size:13px;font-weight:400;color:var(--text3)}
.plan-features{list-style:none;margin-top:10px}
.plan-features li{font-size:12px;color:var(--text2);padding:3px 0;display:flex;align-items:center;gap:6px}
.plan-features li::before{content:'✓';color:var(--teal);font-weight:700;font-size:11px}
/* USAGE BAR */
.usage-bar{background:var(--bg4);border-radius:6px;height:6px;overflow:hidden;margin:6px 0}
.usage-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--teal),var(--coral));transition:width .5s}
/* HISTORY */
.script-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.script-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;transition:all .15s;cursor:default}
.script-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.script-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.script-card-title{font-size:13px;font-weight:700;line-height:1.5;flex:1}
.platform-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.script-card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.meta-tag{font-size:10px;padding:2px 8px;border-radius:5px;background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.script-card-actions{display:flex;gap:6px;flex-wrap:wrap}
/* TEAM */
.member-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.member-row:last-child{border-bottom:none}
.member-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.member-info{flex:1;min-width:0}
.member-name{font-size:13px;font-weight:600}
.member-email{font-size:11px;color:var(--text3)}
/* GENERATOR */
.gen-layout{display:flex;gap:20px;align-items:flex-start}
.gen-sidebar{width:340px;min-width:340px;position:sticky;top:0}
.gen-output{flex:1;min-width:0}
/* SCENE */
.scene-card{border-left:3px solid var(--coral);background:var(--bg3);border-radius:0 var(--r) var(--r) 0;padding:14px 16px;margin-bottom:12px}
.scene-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.scene-num{background:var(--coral);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
.scene-ts{font-size:11px;color:var(--coral);font-weight:700;font-variant-numeric:tabular-nums}
.scene-emo{font-size:11px;color:var(--text3);margin-left:auto}
.scene-ttl{font-size:13px;font-weight:700;margin-bottom:6px}
.scene-row{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:2px}
.scene-row b{color:var(--text3);font-size:10px;font-weight:700;margin-right:4px}
.dlg-box{background:var(--bg4);border-radius:8px;padding:10px 12px;margin-top:8px}
.dlg-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--text3);margin-bottom:6px}
.dlg-line{font-size:12px;line-height:1.7;padding:2px 0}
.dlg-sp{font-weight:700;margin-right:4px}
.dlg-tone{font-size:10px;color:var(--text3);margin-left:4px}
.caption-tag{background:var(--amber-bg);border:1px solid var(--amber)30;color:var(--amber);font-size:11px;padding:4px 10px;border-radius:6px;margin-top:8px;display:inline-block}
/* SCHEDULE */
.sch-row{display:flex;gap:14px;padding:11px 0;border-bottom:1px solid var(--border)}
.sch-row:last-child{border-bottom:none}
.sch-time{min-width:80px}
.sch-t{font-size:13px;font-weight:700;color:var(--coral);font-variant-numeric:tabular-nums}
.sch-d{font-size:10px;color:var(--text3);margin-top:2px}
.sch-task{font-size:13px;font-weight:600;margin-bottom:3px}
.sch-note{font-size:11px;color:var(--text2);line-height:1.6}
.sch-type{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block;margin-top:4px}
.sch-prep{background:var(--purple-bg);color:var(--purple)}
.sch-shoot{background:var(--coral-bg);color:var(--coral)}
.sch-wrap{background:var(--teal-bg);color:var(--teal)}
.sch-break{background:var(--amber-bg);color:var(--amber)}
/* PROPS */
.props-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.prop-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.prop-icon{font-size:22px;margin-bottom:8px}
.prop-name{font-size:12px;font-weight:700;margin-bottom:3px}
.prop-desc{font-size:11px;color:var(--text3);line-height:1.6}
.prop-pri{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block;margin-top:5px}
.pri-must{background:var(--coral-bg);color:var(--coral)}
.pri-opt{background:var(--teal-bg);color:var(--teal)}
/* TABS */
.tabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:18px}
.tab{flex:1;padding:7px;border:none;background:transparent;color:var(--text3);font-family:inherit;font-size:12px;cursor:pointer;border-radius:8px;transition:all .15s;font-weight:500}
.tab.on{background:var(--bg);color:var(--text);box-shadow:0 1px 4px #0005}
/* LOADING */
.spin{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--coral);border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.loading-box{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px 20px}
.loading-txt{font-size:13px;color:var(--text3);animation:pulse 1.4s ease infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
/* EMPTY */
.empty-box{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;text-align:center}
.empty-icon{font-size:48px;opacity:.25}
.empty-ttl{font-size:16px;font-weight:700;color:var(--text2)}
.empty-sub{font-size:13px;color:var(--text3);line-height:1.7;max-width:320px}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:#00000080;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:20px}
/* SETTINGS */
.settings-section{margin-bottom:28px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-lbl{font-size:13px;font-weight:600}
.settings-sub{font-size:11px;color:var(--text3);margin-top:2px}
/* INVITE CODE */
.invite-box{background:var(--bg3);border:1px dashed var(--border3);border-radius:var(--r);padding:16px;text-align:center}
.invite-code{font-size:28px;font-weight:700;letter-spacing:8px;color:var(--teal);margin:8px 0}
/* PLATFORM GRID */
.platform-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.platform-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 8px;text-align:center;cursor:pointer;transition:all .15s;font-size:12px;color:var(--text2)}
.platform-btn:hover{border-color:var(--border2);color:var(--text)}
.platform-btn.on{background:var(--coral-bg);border-color:var(--coral);color:var(--coral);font-weight:600}
.p-icon{font-size:20px;display:block;margin-bottom:4px}
/* SEARCH */
.search-row{display:flex;gap:10px;margin-bottom:20px;align-items:center}
.search-inp{flex:1}
/* SHARED BADGE */
.shared-dot{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--teal);background:var(--teal-bg);border:1px solid var(--teal)30;padding:2px 7px;border-radius:5px}
/* PROGRESS */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.prog-lbl{font-size:12px;color:var(--text2);flex:1}
.prog-val{font-size:12px;font-weight:700;color:var(--text);min-width:60px;text-align:right}
/* HOOK CARD */
.hook-card{background:var(--bg3);border:1px solid var(--coral)30;border-left:4px solid var(--coral);border-radius:0 var(--r) var(--r) 0;padding:14px 16px;margin-bottom:16px}
.hook-lbl{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--coral);margin-bottom:6px}
.hook-text{font-size:15px;font-weight:700;line-height:1.6;color:var(--coral);margin-bottom:8px}
.hook-highlight{font-size:12px;color:var(--text2);background:var(--bg4);padding:8px 10px;border-radius:7px}
/* TAGS */
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.hash-tag{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple)30;padding:3px 10px;border-radius:12px;font-size:11px}
/* UPGRADE BANNER */
.upgrade-banner{background:linear-gradient(135deg,var(--coral-bg),var(--amber-bg));border:1px solid var(--coral)30;border-radius:var(--r2);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px}
.banner-txt{font-size:13px;font-weight:600}
.banner-sub{font-size:11px;color:var(--text2);margin-top:2px}
/* RESP */
@media(max-width:900px){
  .nav{width:60px;min-width:60px}
  .nav-logo-text,.nav-logo-badge,.nav-section,.nav-link span,.nav-user-info{display:none}
  .nav-link{justify-content:center;padding:12px}
  .nav-link .nicon{margin:0;font-size:18px}
  .grid4{grid-template-columns:1fr 1fr}
  .gen-layout{flex-direction:column}
  .gen-sidebar{width:100%;min-width:auto;position:static}
}
@media(max-width:600px){
  .page{padding:16px}
  .grid3{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr}
  .props-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ================================================================
// ⚙️ SUPABASE CONFIG（可選填入，留空則使用本地儲存模式）
// ================================================================
const SUPABASE_URL = '';   // 例：https://xxxx.supabase.co
const SUPABASE_KEY = '';   // 例：eyJhb...
// 注意：若填入Supabase設定，需建立以下資料表：
// - profiles (id, name, plan, usage_count, usage_month, team_id, team_role)
// - scripts (id, user_id, team_id, title, topic, platform, duration, data, shared, created_at)
// - teams (id, name, owner_id, invite_code, members)
const USE_SUPABASE = SUPABASE_URL && SUPABASE_KEY;

// ================================================================
// 📋 PLANS 方案設定
// ================================================================
const PLANS = {
  free:  {name:'免費版',price:0,   limit:5,  members:1,label:'Free', color:'var(--text3)'},
  pro:   {name:'專業版',price:299, limit:50, members:1,label:'Pro',  color:'var(--coral)'},
  team:  {name:'團隊版',price:799, limit:-1, members:5,label:'Team', color:'var(--teal)'},
};

const PLATFORM_MAP = {tiktok:'TikTok',instagram:'Instagram Reels',youtube:'YouTube Shorts',threads:'Threads'};
const AUDIENCE_MAP = {general:'一般大眾（18-45歲）',young:'年輕族群（18-30歲）',parents:'父母族群',office:'上班族',senior:'熟齡族群（45+）',student:'學生族群'};
const BUSINESS_MAP = {service:'服務業（諮詢/教練/顧問）',beauty:'美容美髮',food:'餐飲食品',health:'健康養生',education:'教育培訓',retail:'零售商品',fitness:'健身運動',other:'其他'};
const PLATFORM_COLOR = {tiktok:'#FF6B4A',instagram:'#C77DFF',youtube:'#FF4D4D',threads:'#9AA3B8'};

// ================================================================
// 💾 LOCAL STORAGE (Mock Backend)
// ================================================================
const LS = {u:'sai_users',me:'sai_me',scripts:'sai_scripts',teams:'sai_teams'};
const lsGet = (k,d=null)=>{try{const v=JSON.parse(localStorage.getItem(k));return v??d}catch{return d}};
const lsSet = (k,v)=>localStorage.setItem(k,JSON.stringify(v));

// ================================================================
// 📦 STATE
// ================================================================
let S = {
  user: lsGet(LS.me),
  view: 'auth',
  scripts: [],
  team: null,
  generated: null,
  genLoading: false,
  genTab: 0,
  authMode: 'login',
  histSearch: '',
  histFilter: 'all',
  genState: {platform:'tiktok',styles:['藏鏡人掌鏡'],moods:['溫暖療癒']},
  modal: null, // null | 'upgrade' | 'viewScript' | 'joinTeam' | 'createTeam'
  modalData: null,
  notif: null,
};

if (S.user) { S.view = 'dashboard'; _loadScripts(); _loadTeam(); }

// ================================================================
// 🔐 AUTH
// ================================================================
function authLogin(email, pw) {
  const users = lsGet(LS.u, []);
  const u = users.find(u=>u.email===email&&u.pw===pw);
  if (!u) throw new Error('帳號或密碼錯誤，請再試一次');
  _resetMonthlyUsage(u, users);
  S.user = u; lsSet(LS.me, u);
}
function authSignup(name, email, pw) {
  const users = lsGet(LS.u, []);
  if (users.find(u=>u.email===email)) throw new Error('此信箱已被使用');
  const now = new Date();
  const u = {id:_uid(),name,email,pw,plan:'free',usageCount:0,usageMonth:_monthKey(),teamId:null,teamRole:null,createdAt:now.toISOString()};
  users.push(u); lsSet(LS.u, users);
  S.user = u; lsSet(LS.me, u);
}
function authLogout() {
  S.user=null; S.view='auth'; S.generated=null; S.scripts=[]; S.team=null;
  localStorage.removeItem(LS.me); render();
}
function _resetMonthlyUsage(u, users) {
  if (u.usageMonth !== _monthKey()) {
    u.usageMonth = _monthKey(); u.usageCount = 0;
    const idx = users.findIndex(x=>x.id===u.id);
    if (idx>=0){users[idx]=u; lsSet(LS.u, users);}
  }
}

// ================================================================
// 📜 SCRIPTS
// ================================================================
function _loadScripts() {
  const all = lsGet(LS.scripts, []);
  S.scripts = all.filter(s=>s.userId===S.user?.id||(S.user?.teamId&&s.teamId===S.user.teamId&&s.shared));
}
function saveScript(data, meta) {
  if (!canGenerate()) return;
  const s = {
    id:_uid(),userId:S.user.id,teamId:S.user.teamId||null,
    shared:false,title:data.meta?.title||meta.topic,
    platform:meta.platform,duration:meta.duration,topic:meta.topic,
    scenes:data.scenes?.length||0,data,createdAt:new Date().toISOString()
  };
  const all = lsGet(LS.scripts, []);
  all.unshift(s); lsSet(LS.scripts, all);
  _incrUsage(); _loadScripts();
}
function delScript(id) {
  lsSet(LS.scripts, lsGet(LS.scripts,[]).filter(s=>s.id!==id));
  _loadScripts(); render();
}
function toggleShared(id) {
  const all = lsGet(LS.scripts, []);
  const i = all.findIndex(s=>s.id===id);
  if(i>=0){all[i].shared=!all[i].shared; lsSet(LS.scripts,all); _loadScripts(); render();}
}
function _incrUsage() {
  const users = lsGet(LS.u, []);
  const i = users.findIndex(u=>u.id===S.user.id);
  if(i>=0){
    if(users[i].usageMonth!==_monthKey()){users[i].usageMonth=_monthKey();users[i].usageCount=0;}
    users[i].usageCount=(users[i].usageCount||0)+1;
    lsSet(LS.u, users); S.user=users[i]; lsSet(LS.me, S.user);
  }
}
function canGenerate() {
  if(!S.user) return false;
  const p = PLANS[S.user.plan];
  return p.limit===-1 || (S.user.usageCount||0) < p.limit;
}
function remaining() {
  if(!S.user) return 0;
  const p = PLANS[S.user.plan];
  return p.limit===-1 ? '∞' : Math.max(0, p.limit-(S.user.usageCount||0));
}
function usagePct() {
  if(!S.user) return 0;
  const p = PLANS[S.user.plan];
  if(p.limit===-1) return 20;
  return Math.min(100, Math.round(((S.user.usageCount||0)/p.limit)*100));
}

// ================================================================
// 👥 TEAM
// ================================================================
function _loadTeam() {
  if(!S.user?.teamId){S.team=null;return;}
  S.team = lsGet(LS.teams,[]).find(t=>t.id===S.user.teamId)||null;
}
function createTeam(name) {
  if(!name.trim()) throw new Error('請輸入團隊名稱');
  const t = {id:_uid(),name:name.trim(),ownerId:S.user.id,inviteCode:_code(),
    members:[{userId:S.user.id,name:S.user.name,email:S.user.email,role:'owner',joinedAt:new Date().toISOString()}],
    createdAt:new Date().toISOString()};
  const teams = lsGet(LS.teams,[]); teams.push(t); lsSet(LS.teams, teams);
  _updateUser({teamId:t.id,teamRole:'owner',plan:'team'}); S.team=t;
}
function joinTeam(code) {
  if(!code.trim()) throw new Error('請輸入邀請碼');
  const teams = lsGet(LS.teams, []);
  const i = teams.findIndex(t=>t.inviteCode===code.trim().toUpperCase());
  if(i<0) throw new Error('邀請碼無效，請確認後再試');
  if(teams[i].members.length>=5) throw new Error('此團隊已達人數上限（5人）');
  if(teams[i].members.find(m=>m.userId===S.user.id)) throw new Error('您已是此團隊成員');
  teams[i].members.push({userId:S.user.id,name:S.user.name,email:S.user.email,role:'member',joinedAt:new Date().toISOString()});
  lsSet(LS.teams, teams);
  _updateUser({teamId:teams[i].id,teamRole:'member',plan:'team'}); S.team=teams[i];
}
function leaveTeam() {
  if(!S.team) return;
  const teams = lsGet(LS.teams, []);
  const i = teams.findIndex(t=>t.id===S.team.id);
  if(i>=0){teams[i].members=teams[i].members.filter(m=>m.userId!==S.user.id); lsSet(LS.teams, teams);}
  _updateUser({teamId:null,teamRole:null,plan:'free'}); S.team=null;
}
function removeMember(userId) {
  if(!S.team||S.user.teamRole!=='owner') return;
  const teams = lsGet(LS.teams, []);
  const i = teams.findIndex(t=>t.id===S.team.id);
  if(i>=0){
    teams[i].members=teams[i].members.filter(m=>m.userId!==userId);
    lsSet(LS.teams, teams);
    // downgrade removed user
    const users = lsGet(LS.u, []);
    const ui = users.findIndex(u=>u.id===userId);
    if(ui>=0){users[ui].teamId=null;users[ui].teamRole=null;users[ui].plan='free'; lsSet(LS.u, users);}
    S.team=teams[i];
  }
}
function regenInviteCode() {
  if(!S.team||S.user.teamRole!=='owner') return;
  const teams = lsGet(LS.teams, []);
  const i = teams.findIndex(t=>t.id===S.team.id);
  if(i>=0){teams[i].inviteCode=_code(); lsSet(LS.teams, teams); S.team=teams[i]; notify('邀請碼已更新！','ok'); render();}
}
function upgradePlan(plan) {
  _updateUser({plan}); notify(`已切換至${PLANS[plan].name}！`,'ok');
  S.modal=null; render();
}
function _updateUser(fields) {
  const users = lsGet(LS.u, []);
  const i = users.findIndex(u=>u.id===S.user.id);
  if(i>=0){Object.assign(users[i],fields); lsSet(LS.u, users); S.user=users[i]; lsSet(LS.me, S.user);}
}

function notify(msg,type='ok'){
  S.notif={msg,type}; render();
  setTimeout(()=>{S.notif=null; render();},3000);
}

// ================================================================
// 🧰 UTILS
// ================================================================
function _uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function _monthKey(){const n=new Date();return`${n.getFullYear()}-${n.getMonth()}`}
function _code(){return Math.random().toString(36).slice(2,8).toUpperCase()}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function render() {
  document.getElementById('app').innerHTML = buildApp();
  attachListeners();
}

function buildApp() {
  if(!S.user) return buildAuth();
  return `
    ${S.modal ? buildModal() : ''}

    <div class="layout">
      ${buildNav()}
      <div class="main">
        <div class="page">${buildView()}</div>
      </div>
    </div>`;
}

  try {

    authLogin(email, pw);
    S.view='dashboard'; _loadScripts(); _loadTeam(); render();
  } catch(e) { notify(e.message,'err'); }

function doSignup() {
  try {
    const name=document.getElementById('a-name')?.value.trim();

    if(!name||!email||!pw) throw new Error('請填寫所有欄位');

    authSignup(name, email, pw);
    S.view='dashboard'; _loadScripts(); _loadTeam(); render();
  } catch(e) { notify(e.message,'err'); }
}

}

function toggleStyle(c) { S.genState.styles=[c]; render(); }
function toggleMood(c) {
  if(S.genState.moods.includes(c)) S.genState.moods=S.genState.moods.filter(m=>m!==c);
  else S.genState.moods.push(c);
  render();
}

async function generateScript() {
  const topic = document.getElementById('g-topic')?.value.trim();
  if(!topic){notify('請輸入影片主題！','err');return;}
  if(!canGenerate()){S.modal='upgrade';render();return;}

  const gs = S.genState;
  const meta = {
    platform: gs.platform,
    topic,
    audience: document.getElementById('g-audience')?.value||'general',
    duration: document.getElementById('g-dur')?.value||60,
    business: document.getElementById('g-business')?.value||'service',
    style: gs.styles[0]||'藏鏡人掌鏡',
    moods: gs.moods.join('、'),
    notes: document.getElementById('g-notes')?.value.trim()||'',
  };

  S.genLoading=true; S.generated=null; render();

  const sys=`你是台灣頂尖的短影音腳本規劃師，專精台灣在地市場與流行文化。

【藏鏡人掌鏡風格】
- 拍攝者（創作者）拿手機掌鏡，鏡頭對著客人，創作者不露臉
- 聲音可出現或以字幕呈現，鏡頭跟著客人走、記錄真實互動
- 氛圍要有真實感、紀錄片感，不能太刻意做作

【台灣市場重點】
- 用詞接地氣，符合台灣人說話習慣，可適當用台式用語
- 開場3秒要有強烈懸念或共鳴感（台灣人滑手機速度很快）
- 善用台灣人喜歡的：真實故事、情感共鳴、乾貨知識、幽默反差
- 結尾要有明確的互動引導（留言、追蹤、分享）

只回傳純JSON，不要markdown或任何額外說明：
{
  "meta":{"title":"影片標題（含emoji，吸睛）","hook":"開場鉤子（前3秒）","highlight":"影片最大亮點"},
  "scenes":[{"id":1,"title":"場景名稱","timeStart":"0:00","timeEnd":"0:15","camera":"鏡頭描述（藏鏡人角度）","action":"畫面動作","dialogue":[{"speaker":"掌鏡者","line":"說的話","tone":"語氣"},{"speaker":"客人","line":"回應","tone":"語氣"}],"caption":"建議字幕","emotion":"情緒氛圍"}],
  "schedule":[{"time":"09:00","duration":"15分鐘","task":"任務名稱","type":"prep/shoot/wrap/break","notes":"注意事項"}],
  "props":[{"name":"道具名稱","icon":"emoji","desc":"用途說明","priority":"必備或選配"}],
  "tips":[{"icon":"emoji","title":"技巧標題","desc":"詳細說明"}],
  "hashtags":["#標籤"],
  "postingTime":"最佳發文時間建議"
}`;

  const usr=`【影片主題】${meta.topic}
【發布平台】${PLATFORM_MAP[meta.platform]}
【目標受眾】${AUDIENCE_MAP[meta.audience]}
【影片長度】${meta.duration}秒
【業務類型】${BUSINESS_MAP[meta.business]}
【拍攝風格】${meta.style}
【影片情緒】${meta.moods}
${meta.notes?`【特殊需求】${meta.notes}`:''}

請以藏鏡人掌鏡角度規劃，場景數量符合${meta.duration}秒長度，時間軸精確，台灣市場風格，語氣自然有溫度。`;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: sys, userPrompt: usr })
    });
    
    const data = await res.json();
    
    if (!res.ok) {
        throw new Error(data.error || '伺服器發生錯誤，請檢查後端日誌');
    }

    S.generated = {data: data, meta};
    saveScript(data, meta);
    notify('腳本生成成功，已自動存入歷史記錄！','ok');
  } catch(e) {
    console.error(e);
    notify('生成失敗，請稍後再試：' + e.message, 'err');
  }
  S.genLoading=false; render();
}

function buildScheduleTab(d) {
  if(!(d.schedule||[]).length) return `<div class="empty-box"><div class="empty-icon">📅</div><div class="empty-ttl">暫無時程資料</div></div>`;

  return `<div class="card">

      <div class="sch-time"><div class="sch-t">${esc(s.time)}</div><div class="sch-d">${esc(s.duration)}</div></div>

    </div>`).join('')}
  </div>`;
}

function buildPropsTab(d) {
  if(!(d.props||[]).length) return `<div class="empty-box"><div class="empty-icon">🧰</div><div class="empty-ttl">暫無道具資料</div></div>`;
  const must=d.props.filter(p=>p.priority==='必備');
  const opt=d.props.filter(p=>p.priority!=='必備');
  const section=(title,items,color)=>items.length?`
    <div style="margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:${color};margin-bottom:10px">${title}</div>

    </div>`:'';
  return `<div class="card">${section('必備道具',must,'var(--coral)')}${section('加分選配',opt,'var(--teal)')}</div>`;

function buildTipsTab(d) {

function buildHistory() {

    const q=S.histSearch.toLowerCase();

  return `

function buildScriptCard(s,showDel=false) {
  const platColor=PLATFORM_COLOR[s.platform]||'var(--text3)';
  const date=new Date(s.createdAt).toLocaleDateString('zh-TW',{month:'short',day:'numeric'});
  const isTeamScript=s.teamId&&s.userId!==S.user?.id;
  return `
  <div class="script-card">
    <div class="script-card-head">
      <div class="script-card-title">${esc(s.title||s.topic)}</div>
      <div class="platform-dot" style="background:${platColor}"></div>
    </div>
    <div class="script-card-meta">
      <span class="meta-tag">${PLATFORM_MAP[s.platform]||s.platform}</span>
      <span class="meta-tag">${s.duration}秒</span>
      <span class="meta-tag">${s.scenes||0}場景</span>
      <span class="meta-tag">${date}</span>
      ${isTeamScript?`<span class="shared-dot">👥 團隊</span>`:''}
      ${s.shared&&!isTeamScript?`<span class="shared-dot">🔗 已分享</span>`:''}
    </div>
    <div class="script-card-actions">
      <button class="btn btn-secondary btn-sm" onclick="viewScript('${s.id}')">👀 查看</button>
      <button class="btn btn-secondary btn-sm" onclick="exportScript('${s.id}')">📄 PDF</button>
      ${S.team&&s.userId===S.user?.id?`<button class="btn btn-ghost btn-sm" onclick="toggleShared('${s.id}');notify('${s.shared?'已取消分享':'已分享給團隊！'}','ok')" title="${s.shared?'取消分享':'分享給團隊'}">${s.shared?'🔗':'👥'}</button>`:''}
      ${showDel&&s.userId===S.user?.id?`<button class="btn btn-danger btn-sm" onclick="if(confirm('確定刪除這個腳本？'))delScript('${s.id}')">🗑️</button>`:''}
    </div>
  </div>`;
}

function viewScript(id) {
  const s = lsGet(LS.scripts,[]).find(x=>x.id===id);
  if(!s) return;
  S.modal='viewScript'; S.modalData=s; render();
}
function exportScript(id) {
  const s = lsGet(LS.scripts,[]).find(x=>x.id===id);
  if(s) exportPDF(s);
}

function dissolveTeam() {
  if(!S.team||S.user.teamRole!=='owner') return;
  const teams = lsGet(LS.teams,[]).filter(t=>t.id!==S.team.id);
  lsSet(LS.teams, teams);
  S.team.members.forEach(m=>{
    const users=lsGet(LS.u,[]);
    const i=users.findIndex(u=>u.id===m.userId);
    if(i>=0){users[i].teamId=null;users[i].teamRole=null;if(users[i].plan==='team')users[i].plan='free';lsSet(LS.u,users);}
  });
  _updateUser({teamId:null,teamRole:null,plan:'free'});
  S.team=null; notify('團隊已解散','ok'); render();
}

function editName() {
